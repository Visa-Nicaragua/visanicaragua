<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmación de Visa — República de Nicaragua</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #002147; --navy-mid: #003270; --gold: #C9942A;
      --gold-light: #E8B84B; --green: #1A7A3E; --green-light: #22A356;
      --white: #FDFAF4; --paper: #F7F0E3; --text: #1A1208;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:translateY(0)} }
    @keyframes stampIn { 0%{opacity:0;transform:scale(1.6) rotate(-8deg)} 60%{transform:scale(0.95) rotate(1deg)} 100%{opacity:1;transform:scale(1) rotate(0deg)} }
    @keyframes pulseGreen { 0%,100%{box-shadow:0 0 0 0 rgba(26,122,62,0.4)} 50%{box-shadow:0 0 0 14px rgba(26,122,62,0)} }
    @keyframes spin { to{transform:rotate(360deg)} }

    body {
      font-family: 'EB Garamond', Georgia, serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 0 0 4rem;
      position: relative; overflow-x: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(201,148,42,0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(26,122,62,0.06) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .page-wrap { position: relative; z-index: 1; width: 100%; max-width: 780px; padding: 0 1rem 0; }

    /* BANNER FOTO */
    .banner {
      width: 100%;
      position: relative;
      height: 220px;
      overflow: hidden;
      margin-bottom: 0;
    }
    .banner img {
      width: 100%; height: 100%; object-fit: cover; object-position: center 40%;
      display: block;
    }
    .banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,21,47,0.55) 0%,
        rgba(0,21,47,0.35) 40%,
        rgba(0,21,47,0.80) 100%);
      display: flex; align-items: flex-end;
      padding: 1.2rem 1.8rem;
    }
    .banner-content {
      display: flex; align-items: center; gap: 1.2rem;
      animation: fadeUp 0.7s ease both;
    }
    /* Escudo oficial SVG */
    .escudo { width: 72px; height: 72px; flex-shrink: 0; }
    .banner-text h1 { font-family:'Rajdhani',sans-serif; font-size:0.7rem; font-weight:600; letter-spacing:0.22em; color:var(--gold); text-transform:uppercase; margin-bottom:0.15rem; }
    .banner-text h2 { font-size:1.45rem; font-weight:700; color:var(--white); line-height:1.15; text-shadow: 0 2px 8px rgba(0,0,0,0.5); }
    .banner-text h3 { font-family:'Rajdhani',sans-serif; font-size:0.67rem; letter-spacing:0.16em; color:rgba(255,255,255,0.55); text-transform:uppercase; margin-top:0.2rem; }

    /* FRANJA BANDERA debajo del banner */
    .flag-stripe { height:6px; background:linear-gradient(to right,#002FA7 33.33%,#FFFFFF 33.33% 66.66%,#002FA7 66.66%); margin-bottom: 1.5rem; }

    /* DOCUMENTO */
    .document {
      background: var(--paper); border:1px solid rgba(201,148,42,0.25);
      border-radius:4px; overflow:hidden;
      box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,148,42,0.1), inset 0 1px 0 rgba(255,255,255,0.6);
      animation: fadeUp 0.8s 0.15s ease both; position:relative;
    }
    .document::before {
      content:'APROBADO'; position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) rotate(-35deg);
      font-family:'Rajdhani',sans-serif; font-size:6.5rem; font-weight:700;
      color:rgba(26,122,62,0.055); letter-spacing:0.15em;
      pointer-events:none; white-space:nowrap; z-index:0;
    }
    .doc-inner { position:relative; z-index:1; padding:2.5rem 2.8rem; }

    .status-band {
      display:flex; align-items:center; gap:1rem;
      background:linear-gradient(135deg,var(--green),#155f31);
      border-radius:6px; padding:1rem 1.5rem; margin-bottom:2rem;
      animation: pulseGreen 2s ease 1s 3;
    }
    .status-icon { width:44px;height:44px;background:rgba(255,255,255,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
    .status-icon svg { width:24px;height:24px; }
    .status-text .label { font-family:'Rajdhani',sans-serif;font-size:0.68rem;letter-spacing:0.2em;color:rgba(255,255,255,0.7);text-transform:uppercase; }
    .status-text .value { font-size:1.35rem;font-weight:700;color:#fff;letter-spacing:0.05em; }
    .visa-number { font-family:'Rajdhani',sans-serif;font-size:0.8rem;background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.9);padding:0.35rem 0.8rem;border-radius:4px;letter-spacing:0.1em;white-space:nowrap; }

    .stamp-wrap { position:absolute;top:1.5rem;right:2rem;z-index:10; animation:stampIn 0.6s 1s cubic-bezier(0.23,1.3,0.32,1) both; }
    .stamp { width:120px;height:120px;border:4px solid var(--green);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0.8rem;opacity:0.88;transform:rotate(-12deg);box-shadow:0 0 0 2px rgba(26,122,62,0.3),inset 0 0 12px rgba(26,122,62,0.08); }
    .stamp-top { font-family:'Rajdhani',sans-serif;font-size:0.52rem;letter-spacing:0.18em;color:var(--green);text-transform:uppercase;border-bottom:1px solid rgba(26,122,62,0.4);padding-bottom:0.3rem;margin-bottom:0.3rem;width:100%;text-align:center; }
    .stamp-main { font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--green);letter-spacing:0.08em;line-height:1.1; }
    .stamp-sub { font-family:'Rajdhani',sans-serif;font-size:0.48rem;letter-spacing:0.12em;color:var(--green);opacity:0.8;margin-top:0.25rem; }

    .section { margin-bottom:1.8rem; }
    .section-title { font-family:'Rajdhani',sans-serif;font-size:0.65rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--navy-mid);border-bottom:1.5px solid var(--gold);padding-bottom:0.35rem;margin-bottom:1rem;display:flex;align-items:center;gap:0.5rem; }
    .fields-grid { display:grid;grid-template-columns:1fr 1fr;gap:1rem 2rem; }
    .fields-grid.cols-3 { grid-template-columns:1fr 1fr 1fr; }
    .field { display:flex;flex-direction:column;gap:0.2rem; }
    .field-label { font-family:'Rajdhani',sans-serif;font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:rgba(0,33,71,0.5); }
    .field-value { font-size:1.05rem;font-weight:600;color:var(--navy);letter-spacing:0.02em;line-height:1.3; }
    .field-value.mono { font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:0.12em;color:var(--navy-mid); }
    .badge-tipo { display:inline-block;background:var(--navy);color:var(--gold-light);font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;padding:0.25rem 0.75rem;border-radius:3px;text-transform:uppercase; }

    .bottom-row { display:flex;gap:2rem;align-items:flex-start;margin-top:0.5rem; }
    .qr-section { display:flex;flex-direction:column;align-items:center;gap:0.5rem;flex-shrink:0; }
    .qr-frame { width:120px;height:120px;border:2px solid var(--gold);border-radius:4px;padding:4px;background:white;display:flex;align-items:center;justify-content:center;overflow:hidden; }
    .qr-frame img { width:110px;height:110px;display:block; }
    .qr-label { font-family:'Rajdhani',sans-serif;font-size:0.55rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--navy-mid);opacity:0.6;text-align:center; }

    .mrz-strip { background:#E8E0D0;border-top:1px dashed rgba(0,33,71,0.2);padding:0.9rem 2.8rem;font-family:'Courier New',monospace;font-size:0.72rem;color:rgba(0,33,71,0.5);letter-spacing:0.06em;word-break:break-all;line-height:1.8; }
    .doc-footer { background:var(--navy-mid);padding:0.8rem 2rem;display:flex;align-items:center;justify-content:space-between; }
    .doc-footer-text { font-family:'Rajdhani',sans-serif;font-size:0.6rem;letter-spacing:0.15em;color:rgba(255,255,255,0.45);text-transform:uppercase; }
    .doc-footer-id { font-family:'Rajdhani',sans-serif;font-size:0.65rem;letter-spacing:0.1em;color:var(--gold); }

    .page-footer { text-align:center;margin-top:2rem;animation:fadeUp 0.8s 0.4s ease both; }
    .page-footer p { font-family:'Rajdhani',sans-serif;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3); }

    .loading-screen,.error-screen { display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;color:rgba(255,255,255,0.7);text-align:center;gap:1rem; }
    .spinner { width:48px;height:48px;border:3px solid rgba(201,148,42,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite; }
    .loading-screen p { font-family:'Rajdhani',sans-serif;font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold); }
    .error-screen h2 { font-size:1.5rem;color:var(--white); }
    .error-screen p { font-family:'Rajdhani',sans-serif;font-size:0.8rem;letter-spacing:0.1em;color:rgba(255,255,255,0.4); }

    @media(max-width:600px){
      .banner { height: 170px; }
      .banner-text h2 { font-size:1.1rem; }
      .escudo { width:54px;height:54px; }
      body { padding-bottom: 3rem; }
      .doc-inner{padding:1.8rem 1.4rem}
      .fields-grid{grid-template-columns:1fr 1fr;gap:0.8rem 1.2rem}
      .fields-grid.cols-3{grid-template-columns:1fr 1fr}
      .stamp-wrap{top:1rem;right:1rem}
      .stamp{width:90px;height:90px}
      .stamp-main{font-size:0.85rem}
      .bottom-row{flex-direction:column;align-items:center}
      .mrz-strip{padding:0.8rem 1.4rem;font-size:0.62rem}
    }
  </style>
</head>
<body>

<!-- BANNER FOTO MINISTERIO -->
<div class="banner">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Edificio_Ministerio_del_Interior_de_Nicaragua.jpg/1280px-Edificio_Ministerio_del_Interior_de_Nicaragua.jpg"
       alt="Ministerio del Interior de Nicaragua"
       onerror="this.style.display='none'" />
  <div class="banner-overlay">
    <div class="banner-content">
      <!-- Escudo Oficial de Nicaragua SVG -->
      <svg class="escudo" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="96" fill="#002147" stroke="#C9942A" stroke-width="4"/>
        <circle cx="100" cy="100" r="88" fill="none" stroke="#C9942A" stroke-width="1.5" stroke-dasharray="4,3"/>
        <!-- Mar -->
        <ellipse cx="100" cy="140" rx="72" ry="28" fill="#1565C0"/>
        <!-- Tierra/volcanes -->
        <polygon points="40,138 72,82 100,110 128,72 160,138" fill="#1A7A3E"/>
        <!-- Volcán izq -->
        <polygon points="55,138 72,95 89,138" fill="#2E7D32"/>
        <!-- Volcán centro -->
        <polygon points="82,138 100,88 118,138" fill="#388E3C"/>
        <!-- Volcán der -->
        <polygon points="111,138 128,98 145,138" fill="#2E7D32"/>
        <!-- Sol -->
        <circle cx="100" cy="75" r="14" fill="#F9A825"/>
        <line x1="100" y1="55" x2="100" y2="48" stroke="#F9A825" stroke-width="3"/>
        <line x1="100" y1="95" x2="100" y2="102" stroke="#F9A825" stroke-width="3"/>
        <line x1="80" y1="75" x2="73" y2="75" stroke="#F9A825" stroke-width="3"/>
        <line x1="120" y1="75" x2="127" y2="75" stroke="#F9A825" stroke-width="3"/>
        <line x1="86" y1="61" x2="81" y2="56" stroke="#F9A825" stroke-width="2"/>
        <line x1="114" y1="61" x2="119" y2="56" stroke="#F9A825" stroke-width="2"/>
        <line x1="86" y1="89" x2="81" y2="94" stroke="#F9A825" stroke-width="2"/>
        <line x1="114" y1="89" x2="119" y2="94" stroke="#F9A825" stroke-width="2"/>
        <!-- Arco iris -->
        <path d="M 42,115 Q 100,60 158,115" fill="none" stroke="#E53935" stroke-width="3"/>
        <path d="M 46,119 Q 100,66 154,119" fill="none" stroke="#F9A825" stroke-width="2.5"/>
        <path d="M 50,123 Q 100,72 150,123" fill="none" stroke="#43A047" stroke-width="2.5"/>
        <path d="M 54,127 Q 100,78 146,127" fill="none" stroke="#1E88E5" stroke-width="2"/>
        <!-- Texto -->
        <path id="topArc" d="M 18,100 A 82,82 0 0,1 182,100" fill="none"/>
        <text font-family="serif" font-size="13" font-weight="bold" fill="#C9942A" letter-spacing="2">
          <textPath href="#topArc" startOffset="12%">REPÚBLICA DE NICARAGUA</textPath>
        </text>
        <path id="botArc" d="M 22,108 A 78,78 0 0,0 178,108" fill="none"/>
        <text font-family="serif" font-size="11" fill="#C9942A" letter-spacing="1">
          <textPath href="#botArc" startOffset="18%">AMÉRICA CENTRAL</textPath>
        </text>
      </svg>
      <div class="banner-text">
        <h1>República de Nicaragua</h1>
        <h2>Dirección General de Migración y Extranjería</h2>
        <h3>Ministerio del Interior — Documento Oficial</h3>
      </div>
    </div>
  </div>
</div>
<div class="flag-stripe"></div>

<div class="page-wrap">
  <div id="app">
    <div class="loading-screen">
      <div class="spinner"></div>
      <p>Verificando documento...</p>
    </div>
  </div>
</div>

<script>
  function getParams() {
    const p = new URLSearchParams(window.location.search);
    return {
      nombre:          decodeURIComponent(p.get('nombre') || ''),
      apellido:        decodeURIComponent(p.get('apellido') || ''),
      pasaporte:       decodeURIComponent(p.get('pasaporte') || ''),
      nacionalidad:    decodeURIComponent(p.get('nacionalidad') || ''),
      fechaNacimiento: decodeURIComponent(p.get('fnac') || ''),
      tipoVisa:        decodeURIComponent(p.get('tipo') || ''),
      vigencia:        decodeURIComponent(p.get('vigencia') || ''),
      fechaEmision:    decodeURIComponent(p.get('emision') || ''),
      numeroVisa:      decodeURIComponent(p.get('nvisa') || ''),
    };
  }

  function init() {
    const v = getParams();
    const app = document.getElementById('app');

    if (!v.nombre || !v.pasaporte) {
      app.innerHTML = `
        <div class="error-screen">
          <div style="font-size:3rem">⚠️</div>
          <h2>Documento no válido</h2>
          <p>Este enlace no contiene datos de visa</p>
        </div>`;
      return;
    }

    const hoy = v.fechaEmision || new Date().toLocaleDateString('es-NI',{day:'2-digit',month:'2-digit',year:'numeric'});
    const urlActual = window.location.href;

    const ap = (v.apellido||'').toUpperCase().replace(/\s/g,'<').padEnd(16,'<').substring(0,16);
    const nm = (v.nombre||'').toUpperCase().replace(/\s/g,'<').padEnd(12,'<').substring(0,12);
    const ps = (v.pasaporte||'').toUpperCase().padEnd(9,'<').substring(0,9);
    const mrz1 = ('V<NIC'+ap+'<<'+nm).padEnd(44,'<').substring(0,44);
    const mrz2 = (ps+'0NIC000000000M0000000').padEnd(44,'<').substring(0,44);

    const qrSrc = 'https://api.qrserver.com/v1/create-qr-code/?size=110x110&color=002147&data=' + encodeURIComponent(urlActual);

    app.innerHTML = `
      <div class="document">
        <div class="stamp-wrap">
          <div class="stamp">
            <div class="stamp-top">Nicaragua</div>
            <div class="stamp-main">VISA<br>APROBADA</div>
            <div class="stamp-sub">DGME · ${hoy}</div>
          </div>
        </div>

        <div class="doc-inner">
          <div class="status-band">
            <div class="status-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 6L9 17l-5-5"/>
              </svg>
            </div>
            <div class="status-text">
              <div class="label">Estado de Solicitud</div>
              <div class="value">✓ VISA APROBADA</div>
            </div>
            <div class="visa-number">${v.numeroVisa}</div>
          </div>

          <div class="section">
            <div class="section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
              Datos del Titular
            </div>
            <div class="fields-grid">
              <div class="field"><span class="field-label">Nombre(s)</span><span class="field-value">${v.nombre}</span></div>
              <div class="field"><span class="field-label">Apellido(s)</span><span class="field-value">${v.apellido}</span></div>
              <div class="field"><span class="field-label">Nacionalidad</span><span class="field-value">${v.nacionalidad}</span></div>
              <div class="field"><span class="field-label">Fecha de Nacimiento</span><span class="field-value">${v.fechaNacimiento}</span></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 12h6M9 15h4"/></svg>
              Documento de Viaje
            </div>
            <div class="fields-grid cols-3">
              <div class="field"><span class="field-label">N° Pasaporte</span><span class="field-value mono">${v.pasaporte}</span></div>
              <div class="field"><span class="field-label">Tipo de Visa</span><span class="field-value"><span class="badge-tipo">${v.tipoVisa}</span></span></div>
              <div class="field"><span class="field-label">N° de Visa</span><span class="field-value mono">${v.numeroVisa}</span></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              Vigencia del Documento
            </div>
            <div class="fields-grid cols-3">
              <div class="field"><span class="field-label">Fecha de Emisión</span><span class="field-value">${hoy}</span></div>
              <div class="field"><span class="field-label">Válida Hasta</span><span class="field-value">${v.vigencia}</span></div>
              <div class="field"><span class="field-label">Emitido en</span><span class="field-value">Managua, Nicaragua</span></div>
            </div>
          </div>

          <div class="bottom-row">
            <div style="flex:1">
              <div class="section" style="margin-bottom:0">
                <div class="section-title">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                  Verificación
                </div>
                <div class="fields-grid">
                  <div class="field"><span class="field-label">Estado</span><span class="field-value" style="color:#1A7A3E;font-weight:700">✓ Documento Válido</span></div>
                  <div class="field"><span class="field-label">Verificado por</span><span class="field-value" style="font-size:0.85rem">DGME Nicaragua</span></div>
                </div>
                <p style="font-size:0.78rem;color:rgba(0,33,71,0.55);margin-top:1.2rem;line-height:1.6">
                  Documento emitido por la Dirección General de Migración y Extranjería. Escanee el QR para verificar autenticidad.
                </p>
              </div>
            </div>
            <div class="qr-section">
              <div class="qr-frame">
                <img src="${qrSrc}" alt="QR Verificación" />
              </div>
              <div class="qr-label">Verificar Documento</div>
            </div>
          </div>
        </div>

        <div class="mrz-strip">${mrz1}<br>${mrz2}</div>

        <div class="doc-footer">
          <span class="doc-footer-text">DGME Nicaragua — Ministerio del Interior</span>
          <span class="doc-footer-id">${v.numeroVisa}</span>
        </div>
      </div>

      <div class="page-footer">
        <p>© ${new Date().getFullYear()} Dirección General de Migración y Extranjería — República de Nicaragua</p>
        <p style="margin-top:0.3rem">Documento generado electrónicamente · Válido solo con sello oficial</p>
      </div>
    `;
  }

  init();
</script>
</body>
</html>
