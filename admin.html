<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Visa Nicaragua</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #002147; min-height: 100vh; padding: 1.5rem 1rem; }
    .wrap { max-width: 720px; margin: 0 auto; }

    h2 { color: #E8B84B; font-family: 'Rajdhani', sans-serif; font-size: 1.4rem; margin-bottom: 1.2rem; text-align: center; letter-spacing: .1em; }

    .card { background: #F7F0E3; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 8px 30px rgba(0,0,0,.4); }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: .9rem; }
    .full { grid-column: 1 / -1; }
    .fg { display: flex; flex-direction: column; gap: .3rem; }
    label { font-family: 'Rajdhani', sans-serif; font-size: .7rem; font-weight: 600; letter-spacing: .15em; text-transform: uppercase; color: #5a4a2a; }
    input, select { font-size: 1rem; padding: .55rem .8rem; border: 1.5px solid #ccc; border-radius: 5px; width: 100%; background: #fff; color: #1A1208; }
    input:focus, select:focus { border-color: #003270; outline: none; }

    .line { height: 1px; background: rgba(201,148,42,.3); margin: 1.2rem 0; }

    .btn { width: 100%; padding: .9rem; background: #1A7A3E; border: none; border-radius: 6px; color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: .12em; cursor: pointer; }
    .btn:hover { background: #155f31; }

    .err { color: #b91c1c; font-size: .85rem; margin-top: .5rem; text-align: center; display: none; }

    /* RESULTADO */
    #resultado { display: none; background: #F7F0E3; border-radius: 8px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,.4); }
    .res-top { background: #1A7A3E; padding: 1rem 1.5rem; color: #fff; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .5rem; }
    .res-nombre { font-size: 1.2rem; font-weight: 700; }
    .res-nvisa { font-family: 'Rajdhani', sans-serif; font-size: .8rem; background: rgba(255,255,255,.2); padding: .25rem .7rem; border-radius: 4px; letter-spacing: .1em; }
    .res-cuerpo { padding: 1.3rem 1.5rem; display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: flex-start; }

    .datos { flex: 1; min-width: 200px; }
    .datos table { width: 100%; border-collapse: collapse; }
    .datos td { padding: .35rem .3rem; font-size: .95rem; color: #1A1208; }
    .datos td:first-child { font-family: 'Rajdhani', sans-serif; font-size: .68rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: #7a6840; width: 110px; }

    .qr-col { display: flex; flex-direction: column; align-items: center; gap: .8rem; flex-shrink: 0; }
    #qrimg { width: 180px; height: 180px; border: 3px solid #002147; border-radius: 6px; background: #fff; display: block; }
    .qr-lbl { font-family: 'Rajdhani', sans-serif; font-size: .65rem; letter-spacing: .12em; text-transform: uppercase; color: #7a6840; }

    .btn-dl { display: block; width: 100%; padding: .6rem; background: #002147; border: 2px solid #C9942A; border-radius: 6px; color: #E8B84B; font-family: 'Rajdhani', sans-serif; font-size: .8rem; font-weight: 700; letter-spacing: .1em; text-align: center; text-decoration: none; cursor: pointer; }
    .btn-dl:hover { background: #003270; }
    .btn-nueva { width: 100%; padding: .5rem; background: transparent; border: 1.5px solid #ccc; border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: .78rem; font-weight: 600; letter-spacing: .1em; color: #5a4a2a; margin-top: .3rem; }

    .enlace-box { margin-top: 1rem; padding: .6rem .9rem; background: rgba(0,33,71,.06); border: 1px solid rgba(0,33,71,.15); border-radius: 5px; word-break: break-all; font-size: .8rem; color: #003270; }

    @media(max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <h2>🇳🇮 Panel Admin — Visa Nicaragua</h2>

  <div class="card">
    <div class="grid">
      <div class="fg">
        <label>Nombre(s) *</label>
        <input id="f1" type="text" placeholder="María José" />
      </div>
      <div class="fg">
        <label>Apellido(s) *</label>
        <input id="f2" type="text" placeholder="González Pérez" />
      </div>
      <div class="fg">
        <label>N° Pasaporte *</label>
        <input id="f3" type="text" placeholder="AB1234567" />
      </div>
      <div class="fg">
        <label>Nacionalidad *</label>
        <input id="f4" type="text" placeholder="Cubana" />
      </div>
      <div class="fg">
        <label>Fecha de Nacimiento *</label>
        <input id="f5" type="date" />
      </div>
      <div class="fg">
        <label>Tipo de Visa *</label>
        <select id="f6">
          <option value="Turismo">Turismo</option>
          <option value="Negocios">Negocios</option>
          <option value="Tránsito">Tránsito</option>
          <option value="Residente">Residente</option>
        </select>
      </div>
      <div class="fg">
        <label>Vigencia hasta *</label>
        <input id="f7" type="date" />
      </div>
      <div class="fg">
        <label>Correo (opcional)</label>
        <input id="f8" type="email" placeholder="cliente@correo.com" />
      </div>
    </div>
    <div class="line"></div>
    <button class="btn" id="btnGen">✅ GENERAR VISA Y CÓDIGO QR</button>
    <div class="err" id="err">⚠ Completa todos los campos obligatorios (*)</div>
  </div>

  <div id="resultado">
    <div class="res-top">
      <div class="res-nombre" id="r-nombre"></div>
      <div class="res-nvisa" id="r-nvisa"></div>
    </div>
    <div class="res-cuerpo">
      <div class="datos">
        <table>
          <tr><td>Pasaporte</td><td id="r-pas"></td></tr>
          <tr><td>Nacionalidad</td><td id="r-nac"></td></tr>
          <tr><td>Fecha nac.</td><td id="r-fnac"></td></tr>
          <tr><td>Tipo visa</td><td id="r-tipo"></td></tr>
          <tr><td>Emitida</td><td id="r-emi"></td></tr>
          <tr><td>Vigencia</td><td id="r-vig"></td></tr>
          <tr id="r-mail-tr" style="display:none"><td>Correo</td><td id="r-mail"></td></tr>
        </table>
        <div class="enlace-box" id="r-enlace"></div>
      </div>
      <div class="qr-col">
        <img id="qrimg" src="" alt="QR Code" />
        <div class="qr-lbl">Escanear para ver visa</div>
        <a class="btn-dl" id="btn-dl" href="#" download="QR-Visa.png">⬇ DESCARGAR QR</a>
        <button class="btn-nueva" onclick="nueva()">+ Nueva visa</button>
      </div>
    </div>
  </div>
</div>

<script>
var BASE = 'https://visa-nicaragua.github.io/visanicaragua';

document.getElementById('btnGen').addEventListener('click', function() {
  var v1 = document.getElementById('f1').value.trim();
  var v2 = document.getElementById('f2').value.trim();
  var v3 = document.getElementById('f3').value.trim();
  var v4 = document.getElementById('f4').value.trim();
  var v5 = document.getElementById('f5').value;
  var v6 = document.getElementById('f6').value;
  var v7 = document.getElementById('f7').value;
  var v8 = document.getElementById('f8').value.trim();

  var err = document.getElementById('err');
  if (!v1 || !v2 || !v3 || !v4 || !v5 || !v7) {
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';

  function fmt(iso) {
    var p = iso.split('-');
    return p[2]+'/'+p[1]+'/'+p[0];
  }

  var nvisa = 'NIC-' + Math.random().toString(36).substring(2,8).toUpperCase();
  var hoy = new Date();
  var hoyfmt = ('0'+hoy.getDate()).slice(-2)+'/'+('0'+(hoy.getMonth()+1)).slice(-2)+'/'+hoy.getFullYear();

  var params = 'nombre='+encodeURIComponent(v1)
    +'&apellido='+encodeURIComponent(v2)
    +'&pasaporte='+encodeURIComponent(v3)
    +'&nacionalidad='+encodeURIComponent(v4)
    +'&fnac='+encodeURIComponent(fmt(v5))
    +'&tipo='+encodeURIComponent(v6)
    +'&vigencia='+encodeURIComponent(fmt(v7))
    +'&emision='+encodeURIComponent(hoyfmt)
    +'&nvisa='+encodeURIComponent(nvisa);

  var enlace = BASE + '/?' + params;

  document.getElementById('r-nombre').textContent = v1+' '+v2;
  document.getElementById('r-nvisa').textContent = nvisa;
  document.getElementById('r-pas').textContent = v3;
  document.getElementById('r-nac').textContent = v4;
  document.getElementById('r-fnac').textContent = fmt(v5);
  document.getElementById('r-tipo').textContent = v6;
  document.getElementById('r-emi').textContent = hoyfmt;
  document.getElementById('r-vig').textContent = fmt(v7);
  document.getElementById('r-enlace').textContent = enlace;

  if (v8) {
    document.getElementById('r-mail').textContent = v8;
    document.getElementById('r-mail-tr').style.display = '';
  } else {
    document.getElementById('r-mail-tr').style.display = 'none';
  }

  // QR via imagen directa
  var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=180x180&color=002147&bgcolor=ffffff&data=' + encodeURIComponent(enlace);
  var img = document.getElementById('qrimg');
  img.src = qrUrl;

  // Botón descarga: fetch para blob
  fetch(qrUrl)
    .then(function(r){ return r.blob(); })
    .then(function(blob){
      var url = URL.createObjectURL(blob);
      var dl = document.getElementById('btn-dl');
      dl.href = url;
      dl.download = 'QR-Visa-'+v2.replace(/\s+/g,'-')+'.png';
    })
    .catch(function(){
      document.getElementById('btn-dl').href = qrUrl;
    });

  document.getElementById('resultado').style.display = 'block';
  document.getElementById('resultado').scrollIntoView({behavior:'smooth'});
});

function nueva() {
  ['f1','f2','f3','f4','f5','f7','f8'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('f6').value = 'Turismo';
  document.getElementById('resultado').style.display = 'none';
  document.getElementById('err').style.display = 'none';
  window.scrollTo({top:0, behavior:'smooth'});
}
</script>
</body>
</html>
